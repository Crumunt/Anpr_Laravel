version: '3.8'

services:
  anpr-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anpr-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      # Mount storage for persistence
      - ./storage:/app/storage
      - ./logs:/app/logs
      # Mount camera devices (Linux only - adjust for Windows/Mac)
      # - /dev/video0:/dev/video0
      # - /dev/video1:/dev/video1
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
    restart: unless-stopped
    networks:
      - anpr-network
    # For USB camera access, may need privileged mode
    # privileged: true
    # devices:
    #   - /dev/video0:/dev/video0

networks:
  anpr-network:
    driver: bridge
